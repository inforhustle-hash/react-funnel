<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Get Instant Access</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #070a12 0%, #0b0f19 100%);
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }

  .box {
    width: 100%;
    max-width: 520px;
    background: #12182a;
    border-radius: 18px;
    padding: 34px 28px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0, 255, 204, 0.08);
  }

  .tag {
    margin-bottom: 14px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(0, 255, 204, 0.1);
    border: 1px solid rgba(0, 255, 204, 0.35);
    color: #00ffcc;
    font-size: 13px;
    font-weight: 700;
  }

  h1 {
    margin: 0 0 10px;
    font-size: 34px;
  }

  .sub {
    color: #b8c0d4;
    margin-bottom: 18px;
  }

  input {
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: #00ffcc;
    color: #000;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
  }

  .trust {
    margin-top: 14px;
    font-size: 12px;
    color: #8a94a6;
  }
</style>
</head>

<body>

<div class="box">

  <div class="tag">FREE ACCESS + BONUS</div>

  <h1>Enter Your Details To Unlock Everything</h1>

  <p class="sub">
    Get access to all 10 done-for-you systems plus your free bonus on the next page.
  </p>

  <!-- 🔥 UPDATED FORM -->
  <form id="leadForm" method="post" action="https://www.sendsteed.com/subscribe/">

    <input id="nameField" name="n125084" required type="text" placeholder="Enter your name" />

    <input id="emailField" name="e125084" required type="email" placeholder="Enter your best email" />

    <input type="hidden" name="lllid" value="125084" />
    <input type="hidden" name="lluid" value="theojm" />

    <input type="hidden" name="redirect" id="redirectField" value="https://go.freebiebro.org/thankyou.html" />

    <input type="hidden" name="source" id="sourceField" value="" />

    <button type="submit" id="submitBtn">Unlock Instant Access</button>

  </form>

  <div class="trust">No spam • Instant access • Bonus included</div>

</div>

<script>
(function () {

  const params = new URLSearchParams(window.location.search);
  const src = params.get("src") || "direct";

  const form = document.getElementById("leadForm");
  const btn = document.getElementById("submitBtn");
  const nameField = document.getElementById("nameField");
  const emailField = document.getElementById("emailField");
  const sourceField = document.getElementById("sourceField");
  const redirectField = document.getElementById("redirectField");

  const liveThankYouUrl =
    "https://go.freebiebro.org/thankyou.html?src=" + encodeURIComponent(src);

  sourceField.value = src;
  redirectField.value = liveThankYouUrl;

  localStorage.setItem("funnel_src", src);

  let submitted = false;

  form.addEventListener("submit", function () {

    if (submitted) return false;
    submitted = true;

    btn.disabled = true;
    btn.textContent = "Submitting...";

    const leadData = {
      src: src,
      name: nameField.value.trim(),
      email: emailField.value.trim(),
      listId: "125084",
      source: "sendsteed",
      url: window.location.pathname + window.location.search,
      ip: "",
      userAgent: navigator.userAgent
    };

    const payload = JSON.stringify(leadData);
    const webhookUrl = "https://n8n-production-01ac.up.railway.app/webhook/lead-log";

    try {
      if (navigator.sendBeacon) {
        const blob = new Blob([payload], { type: "application/json" });
        navigator.sendBeacon(webhookUrl, blob);
      } else {
        fetch(webhookUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: payload,
          keepalive: true
        });
      }
    } catch (err) {
      console.error("Lead log failed", err);
    }

  });

})();
</script>

</body>
</html>
