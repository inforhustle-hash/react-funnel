<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const src = params.get("src") || "direct";

  const form = document.getElementById("leadForm");
  const btn = document.getElementById("submitBtn");
  const nameField = document.getElementById("nameField");
  const emailField = document.getElementById("emailField");
  const sourceField = document.getElementById("sourceField");
  const redirectField = document.getElementById("redirectField");

  const liveThankYouUrl =
    "https://go.freebiebro.org/thankyou.html?src=" + encodeURIComponent(src);

  sourceField.value = src;
  redirectField.value = liveThankYouUrl;
  localStorage.setItem("funnel_src", src);

  let submitted = false;

  form.addEventListener("submit", async function (e) {
    if (submitted) {
      e.preventDefault();
      return false;
    }

    e.preventDefault();
    submitted = true;

    if (btn) {
      btn.disabled = true;
      btn.textContent = "Submitting...";
    }

    const leadData = {
      src: src,
      name: nameField.value.trim(),
      email: emailField.value.trim(),
      listId: "125084",
      source: "sendsteed",
      url: window.location.pathname + window.location.search,
      ip: "",
      userAgent: navigator.userAgent
    };

    try {
      await fetch("https://n8n-production-01ac.up.railway.app/webhook/lead-log", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(leadData)
      });
    } catch (err) {
      console.error("Lead log failed", err);
    }

    form.submit();
  });
})();
</script>
